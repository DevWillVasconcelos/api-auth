<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - API Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">API Auth</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/profile.html">Perfil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="logoutBtn">Sair</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div id="loadingScreen" class="loading">
            <div class="loading-spinner"></div>
            <p>Carregando dados do usuário...</p>
        </div>

        <div id="dashboardContent" style="display: none;">
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="stats-card">
                        <div class="stats-number" id="userName">---</div>
                        <div class="stats-label">Nome do Usuário</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stats-card">
                        <div class="stats-number" id="userEmail">---</div>
                        <div class="stats-label">E-mail</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stats-card">
                        <div class="stats-number" id="userRole">---</div>
                        <div class="stats-label">Papel</div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">Informações da Conta</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <p><strong>ID do Usuário:</strong> <span id="userId"></span></p>
                                    <p><strong>Status da Conta:</strong> <span class="badge bg-success" id="userStatus">Ativo</span></p>
                                </div>
                                <div class="col-md-6">
                                    <p><strong>Data de Criação:</strong> <span id="userCreatedAt"></span></p>
                                    <p><strong>Último Login:</strong> <span id="userLastLogin"></span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row mt-4">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">Ações Rápidas</h5>
                        </div>
                        <div class="card-body">
                            <div class="d-flex gap-3 justify-content-center">
                                <a href="/profile.html" class="btn btn-primary">Editar Perfil</a>
                                <button class="btn btn-danger" id="deleteAccountBtn" onclick="confirmDelete()">Deletar Conta</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 API Auth - Sistema de Autenticação Seguro</p>
        </div>
    </footer>

    <script>
        const API_URL = window.location.origin + '/api/v1';
        
        function getToken() {
            return localStorage.getItem('token');
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }
        
        async function loadDashboard() {
            const token = getToken();
            
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/me`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Token inválido');
                }
                
                const data = await response.json();
                const user = data.user;
                
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userRole').textContent = user.role || 'user';
                document.getElementById('userId').textContent = user._id;
                
                if (user.createdAt) {
                    const createdAt = new Date(user.createdAt);
                    document.getElementById('userCreatedAt').textContent = createdAt.toLocaleDateString('pt-BR');
                }
                
                if (user.lastLogin) {
                    const lastLogin = new Date(user.lastLogin);
                    document.getElementById('userLastLogin').textContent = lastLogin.toLocaleDateString('pt-BR');
                }
                
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'block';
                
            } catch (error) {
                console.error('Erro:', error);
                alert('Sessão expirada. Faça login novamente.');
                logout();
            }
        }
        
        async function confirmDelete() {
            if (confirm('Tem certeza que deseja deletar sua conta? Esta ação é irreversível!')) {
                const token = getToken();
                
                try {
                    const response = await fetch(`${API_URL}/me`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (response.ok) {
                        alert('Conta deletada com sucesso!');
                        logout();
                    } else {
                        const data = await response.json();
                        alert(data.message || 'Erro ao deletar conta');
                    }
                } catch (error) {
                    alert('Erro ao deletar conta');
                }
            }
        }
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });
        
        loadDashboard();
    </script>
</body>
</html>
